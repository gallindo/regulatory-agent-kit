[alembic]
script_location = migrations
# Default connection URL for local development.
# Override at runtime with DATABASE_URL env var (see migrations/env.py).
sqlalchemy.url = postgresql://rak_admin:rak_admin_dev_password@localhost:5432/rak
version_table_schema = rak

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
