# ---------------------------------------------------------------
# Grafana — Auto-provisioned Datasources
# ---------------------------------------------------------------
# This file is mounted into the Grafana container to
# auto-configure the Prometheus datasource on first boot.
# ---------------------------------------------------------------

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
