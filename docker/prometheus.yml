# ---------------------------------------------------------------
# Prometheus — Scrape Configuration
# ---------------------------------------------------------------
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/
# ---------------------------------------------------------------

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rak-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["rak-api:8000"]

  - job_name: "rak-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["rak-worker:9464"]

  - job_name: "temporal"
    metrics_path: /metrics
    static_configs:
      - targets: ["temporal:9090"]

  - job_name: "litellm"
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]
