; ---------------------------------------------------------------
; PgBouncer Configuration — regulatory-agent-kit
; ---------------------------------------------------------------
; Docs: docs/hld.md Section 4.6
;
; Required when scaling beyond 3 workers:
;   Workers (N) --> PgBouncer (pool: 100) --> PostgreSQL (max_connections: 200)
;
; Activate via:  docker compose --profile pgbouncer up -d
; ---------------------------------------------------------------

[databases]
; Connect to the RAK database on the postgres service.
; In Docker Compose the hostname resolves to the postgres container.
rak = host=postgres port=5432 dbname=rak

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; --- Authentication ---
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; --- Pool settings (docs/hld.md §4.6) ---
pool_mode = transaction
max_client_conn = 200
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5

; --- Timeouts ---
server_idle_timeout = 300
server_connect_timeout = 15
query_timeout = 0
query_wait_timeout = 120

; --- Logging ---
log_connections = 1
log_disconnections = 1
stats_period = 60

; --- Admin ---
admin_users = rak
