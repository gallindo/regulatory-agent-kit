# ---------------------------------------------------------------
# Alertmanager Configuration — regulatory-agent-kit
# ---------------------------------------------------------------
# Docs: docs/infrastructure.md Section 11.1
#
# Routing hierarchy:
#   severity=critical  → rak-critical  (PagerDuty webhook)
#   severity=warning   → rak-warning   (Slack #rak-alerts)
#   default            → rak-default   (email)
#
# IMPORTANT: Replace placeholder webhook URLs with your actual
# PagerDuty / Slack / email configuration before production use.
# ---------------------------------------------------------------

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: rak-default

  routes:
    - match:
        severity: critical
      receiver: rak-critical
      repeat_interval: 15m

    - match:
        severity: warning
      receiver: rak-warning
      repeat_interval: 1h

receivers:
  - name: rak-critical
    webhook_configs:
      - url: "http://localhost:9095/pagerduty"
        send_resolved: true

  - name: rak-warning
    webhook_configs:
      - url: "http://localhost:9095/slack"
        send_resolved: true

  - name: rak-default
    webhook_configs:
      - url: "http://localhost:9095/email"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]
