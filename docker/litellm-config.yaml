# ---------------------------------------------------------------
# LiteLLM Proxy — Model Configuration
# ---------------------------------------------------------------
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# API keys are read from environment variables at runtime —
# never hardcode secrets in this file.
#
# Regional models enforce data residency routing per
# architecture.md Section 6 and sad.md RC-1.
# ---------------------------------------------------------------

model_list:
  # --- Anthropic Claude (primary — default / US) ---
  - model_name: "anthropic/claude-sonnet-4-6"
    litellm_params:
      model: "claude-sonnet-4-6"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  - model_name: "anthropic/claude-haiku-4-5"
    litellm_params:
      model: "claude-haiku-4-5-20251001"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # --- AWS Bedrock — EU (eu-west-1) for GDPR compliance ---
  - model_name: "bedrock/eu/claude-sonnet-4-6"
    litellm_params:
      model: "bedrock/eu.claude-sonnet-4-6"
      aws_region_name: "eu-west-1"
      aws_access_key_id: "os.environ/AWS_ACCESS_KEY_ID"
      aws_secret_access_key: "os.environ/AWS_SECRET_ACCESS_KEY"

  - model_name: "bedrock/eu/claude-haiku-4-5"
    litellm_params:
      model: "bedrock/eu.claude-haiku-4-5-20251001"
      aws_region_name: "eu-west-1"
      aws_access_key_id: "os.environ/AWS_ACCESS_KEY_ID"
      aws_secret_access_key: "os.environ/AWS_SECRET_ACCESS_KEY"

  # --- AWS Bedrock — Brazil (sa-east-1) for LGPD compliance ---
  - model_name: "bedrock/br/claude-sonnet-4-6"
    litellm_params:
      model: "bedrock/br.claude-sonnet-4-6"
      aws_region_name: "sa-east-1"
      aws_access_key_id: "os.environ/AWS_ACCESS_KEY_ID"
      aws_secret_access_key: "os.environ/AWS_SECRET_ACCESS_KEY"

  - model_name: "bedrock/br/claude-haiku-4-5"
    litellm_params:
      model: "bedrock/br.claude-haiku-4-5-20251001"
      aws_region_name: "sa-east-1"
      aws_access_key_id: "os.environ/AWS_ACCESS_KEY_ID"
      aws_secret_access_key: "os.environ/AWS_SECRET_ACCESS_KEY"

  # --- AWS Bedrock — Asia-Pacific (ap-southeast-2) ---
  - model_name: "bedrock/ap/claude-sonnet-4-6"
    litellm_params:
      model: "bedrock/ap.claude-sonnet-4-6"
      aws_region_name: "ap-southeast-2"
      aws_access_key_id: "os.environ/AWS_ACCESS_KEY_ID"
      aws_secret_access_key: "os.environ/AWS_SECRET_ACCESS_KEY"

  - model_name: "bedrock/ap/claude-haiku-4-5"
    litellm_params:
      model: "bedrock/ap.claude-haiku-4-5-20251001"
      aws_region_name: "ap-southeast-2"
      aws_access_key_id: "os.environ/AWS_ACCESS_KEY_ID"
      aws_secret_access_key: "os.environ/AWS_SECRET_ACCESS_KEY"

  # --- OpenAI (fallback / cost optimization) ---
  - model_name: "openai/gpt-4o"
    litellm_params:
      model: "gpt-4o"
      api_key: "os.environ/OPENAI_API_KEY"

  - model_name: "openai/gpt-4o-mini"
    litellm_params:
      model: "gpt-4o-mini"
      api_key: "os.environ/OPENAI_API_KEY"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"

litellm_settings:
  success_callback: ["mlflow"]
  mlflow_tracking_uri: "http://mlflow:5000"

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 2
  timeout: 30

  fallbacks:
    - claude-sonnet-4-6: ["claude-haiku-4-5", "gpt-4o"]
    - bedrock-eu-claude-sonnet: ["bedrock-eu-claude-haiku", "claude-sonnet-4-6"]
    - bedrock-br-claude-sonnet: ["bedrock-br-claude-haiku", "claude-sonnet-4-6"]
    - bedrock-ap-claude-sonnet: ["bedrock-ap-claude-haiku", "claude-sonnet-4-6"]
