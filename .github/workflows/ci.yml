# ---------------------------------------------------------------
# regulatory-agent-kit — CI Pipeline
# ---------------------------------------------------------------
# Runs on every PR and push to main. Performs lint, typecheck, tests,
# dependency audit, and SBOM generation.
# See architecture.md Section 9 (supply chain security).
#
# Security: No untrusted inputs are used in run: commands.
# ---------------------------------------------------------------

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # -----------------------------------------------------------------
  # Lint + Format
  # -----------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  # -----------------------------------------------------------------
  # Type check
  # -----------------------------------------------------------------
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras
      - name: mypy strict
        run: uv run mypy src/

  # -----------------------------------------------------------------
  # Tests
  # -----------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras
      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ -v \
            --cov=regulatory_agent_kit \
            --cov-report=term-missing \
            --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          if-no-files-found: ignore

  # -----------------------------------------------------------------
  # Dependency audit (pip-audit)
  # -----------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras
      - name: Install pip-audit
        run: uv pip install --system pip-audit
      - name: Run pip-audit
        run: |
          # GHSA-xqmj-j6mv-4862: LiteLLM Proxy /prompts/test SSTI - not applicable.
          # RAK uses LiteLLM as a client library only, never as a proxy server.
          # Upgrade blocked: pydantic-ai requires temporalio<1.20 for litellm>=1.83.7,
          # but this project requires temporalio>=1.24.0 (unresolvable conflict).
          uv export --no-emit-project --format requirements-txt \
            | pip-audit -r /dev/stdin --strict --desc \
                --ignore-vuln GHSA-xqmj-j6mv-4862

  # -----------------------------------------------------------------
  # SBOM generation (CycloneDX)
  # -----------------------------------------------------------------
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install uv
          uv sync --all-extras
      - name: Install CycloneDX
        run: uv pip install --system cyclonedx-bom
      - name: Generate SBOM
        run: cyclonedx-py environment --of JSON -o sbom.json "$(uv python find)"
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
