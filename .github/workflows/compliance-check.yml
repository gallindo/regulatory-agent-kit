# ---------------------------------------------------------------
# regulatory-agent-kit — Compliance Gate (GitHub Action)
# ---------------------------------------------------------------
# Runs on every PR targeting main. Scans changed files against the
# configured regulation plugin and fails the check if violations
# are found. See docs/architecture.md Section 5.3.
#
# Usage: copy this workflow into your repository and set the
# RAK_REGULATION_PLUGIN input to your plugin path.
# ---------------------------------------------------------------

name: Compliance Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  compliance-scan:
    name: Regulation Compliance Scan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install regulatory-agent-kit
        run: |
          pip install uv
          uv sync --all-extras

      - name: Validate regulation plugin
        env:
          RAK_PLUGIN: ${{ inputs.regulation_plugin || 'regulations/examples/example.yaml' }}
        run: uv run rak plugin validate "$RAK_PLUGIN"

      - name: Detect changed files
        id: changed
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE"
            HEAD="$PR_HEAD"
          else
            BASE="$PUSH_BEFORE"
            HEAD="$PUSH_SHA"
          fi
          git diff --name-only "$BASE" "$HEAD" > changed_files.txt
          echo "count=$(wc -l < changed_files.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Run compliance scan
        env:
          RAK_PLUGIN: ${{ inputs.regulation_plugin || 'regulations/examples/example.yaml' }}
        run: |
          uv run python -m regulatory_agent_kit.ci.compliance_scanner \
            --regulation "$RAK_PLUGIN" \
            --changed-files changed_files.txt \
            --output compliance-report.json \
            --exclude ".github/**" ".gitlab/**" "docker/**" "helm/**" \
                      ".pre-commit-hooks.yaml" "*.md" "*.txt" "*.lock" \
                      "regulations/**" "docs/**" "tests/**"

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.json
          if-no-files-found: ignore
