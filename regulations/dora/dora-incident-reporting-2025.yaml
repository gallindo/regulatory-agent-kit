# DORA Pillar 2 — ICT Incident Reporting
# Regulation (EU) 2022/2554, Articles 17–23
# RTS: JC 2023 83 — Classification of ICT incidents

id: dora-incident-reporting-2025
name: "DORA ICT Incident Reporting Requirements"
version: "1.0.0"
effective_date: "2025-01-17"
jurisdiction: "EU"
authority: "European Banking Authority"
source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32022R2554"

disclaimer: >
  This plugin represents one interpretation of Regulation (EU) 2022/2554 (DORA),
  Articles 17–23 and associated RTS JC 2023 83. It does not constitute legal advice.
  Organizations must validate compliance with their own legal and compliance teams.

changelog: "1.0.0: Initial release aligned with DORA application date 2025-01-17."

regulatory_technical_standards:
  - id: "JC-2023-83"
    name: "RTS on classification of ICT incidents"
    url: "https://www.eba.europa.eu/activities/digital-finance/digital-operational-resilience-act-dora"

cross_references:
  - regulation_id: "gdpr"
    relationship: does_not_override
    articles: ["2(3)", "33"]
    conflict_handling: escalate_to_human
  - regulation_id: "nis2"
    relationship: takes_precedence
    articles: ["1(2)"]
  - regulation_id: "psd2"
    relationship: complementary
    articles: ["2(1)(a)", "96"]

event_trigger:
  topic: "regulatory-changes"
  schema:
    regulation_id: "dora-incident-reporting-2025"
    change_type: "new_requirement"

rules:
  - id: DORA-IR-001
    description: >
      Incident classification must use a structured enum or class with
      severity levels matching DORA Article 18 materiality thresholds:
      number of clients affected, duration, geographic spread, data losses,
      criticality of services, and economic impact.
    severity: critical
    dora_pillar: ict_incident_reporting
    dora_article: "Article 18"
    rts_reference: "JC-2023-83"
    affects:
      - pattern: "**/*.java"
        condition: "class implements IncidentClassifier AND NOT has_method(classifyBySeverity)"
      - pattern: "**/*.py"
        condition: "class implements IncidentClassifier AND NOT has_method(classify_by_severity)"
    remediation:
      strategy: replace_pattern
      template: templates/incident_classification.j2
      test_template: templates/incident_classification_test.j2
      confidence_threshold: 0.80

  - id: DORA-IR-002
    description: >
      Initial incident notification must be sent within 4 hours of
      classification as major per DORA Article 19(4)(a). Reporting
      pipeline must enforce this timeline constraint.
    severity: critical
    dora_pillar: ict_incident_reporting
    dora_article: "Article 19(4)(a)"
    rts_reference: "JC-2023-83"
    affects:
      - pattern: "**/*.java"
        condition: "class implements IncidentReporter AND NOT has_method(sendInitialNotification)"
      - pattern: "**/*.py"
        condition: "class implements IncidentReporter AND NOT has_method(send_initial_notification)"
    remediation:
      strategy: replace_pattern
      template: templates/reporting_timeline.j2
      test_template: templates/reporting_timeline_test.j2
      confidence_threshold: 0.75

  - id: DORA-IR-003
    description: >
      Intermediate report must be submitted within 72 hours with updated
      details per DORA Article 19(4)(b). Code must enforce intermediate
      reporting deadlines.
    severity: high
    dora_pillar: ict_incident_reporting
    dora_article: "Article 19(4)(b)"
    rts_reference: "JC-2023-83"
    affects:
      - pattern: "**/*.java"
        condition: "class implements IncidentReporter AND NOT has_method(sendIntermediateReport)"
      - pattern: "**/*.py"
        condition: "class implements IncidentReporter AND NOT has_method(send_intermediate_report)"
    remediation:
      strategy: replace_pattern
      template: templates/intermediate_report.j2
      confidence_threshold: 0.75

  - id: DORA-IR-004
    description: >
      Root cause analysis must be documented for every major ICT incident
      per DORA Article 20. Services handling incidents must produce
      structured root cause analysis reports.
    severity: high
    dora_pillar: ict_incident_reporting
    dora_article: "Article 20"
    rts_reference: "JC-2023-83"
    affects:
      - pattern: "**/*.java"
        condition: "class implements IncidentHandler AND NOT has_method(generateRootCauseAnalysis)"
      - pattern: "**/*.py"
        condition: "class implements IncidentHandler AND NOT has_method(generate_root_cause_analysis)"
    remediation:
      strategy: generate_file
      template: templates/root_cause_template.j2
      confidence_threshold: 0.75

  - id: DORA-IR-005
    description: >
      All ICT incidents must be logged with structured metadata per
      DORA Article 17(1) on the ICT-related incident management process.
    severity: high
    dora_pillar: ict_incident_reporting
    dora_article: "Article 17(1)"
    rts_reference: "JC-2023-83"
    affects:
      - pattern: "**/*.java"
        condition: "class implements Service AND NOT has_annotation(@IncidentLogging)"
      - pattern: "**/*.py"
        condition: "class implements Service AND NOT has_decorator(@incident_logging)"
    remediation:
      strategy: add_annotation
      template: templates/incident_logging.j2
      test_template: templates/incident_logging_test.j2
      confidence_threshold: 0.85

supersedes: null
