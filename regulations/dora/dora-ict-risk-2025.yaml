# DORA Pillar 1 — ICT Risk Management
# Regulation (EU) 2022/2554, Articles 5–16
# RTS: JC 2023 86 — ICT risk management framework

id: dora-ict-risk-2025
name: "DORA ICT Risk Management Requirements"
version: "1.0.0"
effective_date: "2025-01-17"
jurisdiction: "EU"
authority: "European Banking Authority"
source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32022R2554"

disclaimer: >
  This plugin represents one interpretation of Regulation (EU) 2022/2554 (DORA),
  Articles 5–16 and associated RTS JC 2023 86. It does not constitute legal advice.
  Organizations must validate compliance with their own legal and compliance teams.

changelog: "1.0.0: Initial release aligned with DORA application date 2025-01-17."

regulatory_technical_standards:
  - id: "JC-2023-86"
    name: "RTS on ICT risk management framework"
    url: "https://www.eba.europa.eu/activities/digital-finance/digital-operational-resilience-act-dora"

cross_references:
  - regulation_id: "gdpr"
    relationship: does_not_override
    articles: ["2(3)"]
    conflict_handling: escalate_to_human
  - regulation_id: "nis2"
    relationship: takes_precedence
    articles: ["1(2)"]
  - regulation_id: "psd2"
    relationship: complementary
    articles: ["2(1)(a)"]

event_trigger:
  topic: "regulatory-changes"
  schema:
    regulation_id: "dora-ict-risk-2025"
    change_type: "new_requirement"

rules:
  - id: DORA-ICT-001
    description: >
      All ICT service classes must have structured audit logging for traceability
      and incident forensics per DORA Article 12 and RTS JC 2023 86.
    severity: critical
    dora_pillar: ict_risk_management
    dora_article: "Article 12"
    rts_reference: "JC-2023-86"
    affects:
      - pattern: "**/*.java"
        condition: "class implements Service AND NOT has_annotation(@AuditLog)"
      - pattern: "**/*.kt"
        condition: "class implements Service AND NOT has_annotation(@AuditLog)"
      - pattern: "**/*.py"
        condition: "class implements Service AND NOT has_decorator(@audit_log)"
    remediation:
      strategy: add_annotation
      template: templates/audit_log_annotation.j2
      test_template: templates/audit_log_annotation_test.j2
      confidence_threshold: 0.85

  - id: DORA-ICT-002
    description: >
      Service manifests must document Recovery Time Objective (RTO) and
      Recovery Point Objective (RPO) per DORA Article 11(6) on business
      continuity and disaster recovery.
    severity: high
    dora_pillar: ict_risk_management
    dora_article: "Article 11(6)"
    rts_reference: "JC-2023-86"
    affects:
      - pattern: "**/service-manifest.yaml"
        condition: "NOT has_key(resilience.rto) OR NOT has_key(resilience.rpo)"
      - pattern: "**/service-manifest.yml"
        condition: "NOT has_key(resilience.rto) OR NOT has_key(resilience.rpo)"
    remediation:
      strategy: add_configuration
      template: templates/resilience_manifest.j2
      confidence_threshold: 0.90

  - id: DORA-ICT-003
    description: >
      All ICT assets must be registered in a machine-readable asset inventory
      per DORA Article 8 on identification of ICT-supported business functions
      and information assets.
    severity: high
    dora_pillar: ict_risk_management
    dora_article: "Article 8"
    rts_reference: "JC-2023-86"
    affects:
      - pattern: "**/deployment.yaml"
        condition: "NOT has_key(metadata.labels.ict-asset-id)"
      - pattern: "**/deployment.yml"
        condition: "NOT has_key(metadata.labels.ict-asset-id)"
    remediation:
      strategy: add_configuration
      template: templates/asset_register.j2
      confidence_threshold: 0.90

  - id: DORA-ICT-004
    description: >
      Encryption must be configured for data at rest and in transit per
      DORA Article 9(4)(c) on protection and prevention measures.
    severity: critical
    dora_pillar: ict_risk_management
    dora_article: "Article 9(4)(c)"
    rts_reference: "JC-2023-86"
    affects:
      - pattern: "**/application.yaml"
        condition: "NOT has_key(security.encryption.at_rest) OR NOT has_key(security.encryption.in_transit)"
      - pattern: "**/application.yml"
        condition: "NOT has_key(security.encryption.at_rest) OR NOT has_key(security.encryption.in_transit)"
      - pattern: "**/application.properties"
        condition: "NOT has_key(security.encryption.at_rest)"
    remediation:
      strategy: add_configuration
      template: templates/encryption_config.j2
      confidence_threshold: 0.80

  - id: DORA-ICT-005
    description: >
      Access control policies must be defined per DORA Article 9(4)(b)
      on network security and access management.
    severity: high
    dora_pillar: ict_risk_management
    dora_article: "Article 9(4)(b)"
    rts_reference: "JC-2023-86"
    affects:
      - pattern: "**/*.java"
        condition: "class implements Controller AND NOT has_annotation(@RolesAllowed)"
      - pattern: "**/*.py"
        condition: "class implements APIView AND NOT has_decorator(@permission_classes)"
    remediation:
      strategy: add_annotation
      template: templates/access_control.j2
      test_template: templates/access_control_test.j2
      confidence_threshold: 0.80

  - id: DORA-ICT-006
    description: >
      Dependencies must be scanned for known vulnerabilities per
      DORA Article 9(3) on the obligation to keep ICT systems up to date.
    severity: high
    dora_pillar: ict_risk_management
    dora_article: "Article 9(3)"
    rts_reference: "JC-2023-86"
    affects:
      - pattern: "**/pom.xml"
        condition: "NOT has_key(plugin.org.owasp:dependency-check-maven)"
      - pattern: "**/build.gradle"
        condition: "NOT has_key(plugin.org.owasp.dependencycheck)"
      - pattern: "**/requirements.txt"
        condition: "NOT has_key(safety) AND NOT has_key(pip-audit)"
    remediation:
      strategy: add_dependency
      template: templates/dependency_check.j2
      confidence_threshold: 0.90

  - id: DORA-ICT-007
    description: >
      Backup configuration must be defined with frequency and retention
      per DORA Article 12(1) on backup policies and restoration procedures.
    severity: medium
    dora_pillar: ict_risk_management
    dora_article: "Article 12(1)"
    rts_reference: "JC-2023-86"
    affects:
      - pattern: "**/service-manifest.yaml"
        condition: "NOT has_key(backup.frequency) OR NOT has_key(backup.retention_days)"
      - pattern: "**/service-manifest.yml"
        condition: "NOT has_key(backup.frequency) OR NOT has_key(backup.retention_days)"
    remediation:
      strategy: add_configuration
      template: templates/backup_config.j2
      confidence_threshold: 0.90

supersedes: null
