# DORA Pillar 4 — ICT Third-Party Risk Management
# Regulation (EU) 2022/2554, Articles 28–44
# RTS on ICT third-party policy

id: dora-third-party-risk-2025
name: "DORA ICT Third-Party Risk Management Requirements"
version: "1.0.0"
effective_date: "2025-01-17"
jurisdiction: "EU"
authority: "European Banking Authority"
source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32022R2554"

disclaimer: >
  This plugin represents one interpretation of Regulation (EU) 2022/2554 (DORA),
  Articles 28–44 and associated RTS on ICT third-party policy. It does not
  constitute legal advice. Organizations must validate compliance with their own
  legal and compliance teams.

changelog: "1.0.0: Initial release aligned with DORA application date 2025-01-17."

regulatory_technical_standards:
  - id: "TPR-RTS"
    name: "RTS on ICT third-party risk policy"
    url: "https://www.eba.europa.eu/activities/digital-finance/digital-operational-resilience-act-dora"
  - id: "ITS-ROI"
    name: "ITS on registers of information for ICT third-party arrangements"
    url: "https://www.eba.europa.eu/activities/digital-finance/digital-operational-resilience-act-dora"

cross_references:
  - regulation_id: "gdpr"
    relationship: does_not_override
    articles: ["2(3)", "28"]
    conflict_handling: escalate_to_human
  - regulation_id: "nis2"
    relationship: takes_precedence
    articles: ["1(2)"]
  - regulation_id: "dora-ict-risk-2025"
    relationship: complementary
    articles: ["28(1)"]

event_trigger:
  topic: "regulatory-changes"
  schema:
    regulation_id: "dora-third-party-risk-2025"
    change_type: "new_requirement"

rules:
  - id: DORA-TPR-001
    description: >
      All third-party dependencies must be audited and documented in a
      register of information per DORA Article 28(3) on the general
      principles of ICT third-party risk management.
    severity: high
    dora_pillar: ict_third_party_risk_management
    dora_article: "Article 28(3)"
    rts_reference: "ITS-ROI"
    affects:
      - pattern: "**/pom.xml"
        condition: "NOT has_key(dependency.audit.last_conducted)"
      - pattern: "**/build.gradle"
        condition: "NOT has_key(dependency.audit.last_conducted)"
      - pattern: "**/package.json"
        condition: "NOT has_key(auditConfig)"
      - pattern: "**/requirements.txt"
        condition: "NOT has_key(audit.last_conducted)"
    remediation:
      strategy: generate_file
      template: templates/dependency_audit.j2
      confidence_threshold: 0.85

  - id: DORA-TPR-002
    description: >
      Subcontracting chains must be documented for critical or important
      functions per DORA Article 29(2) on provisions regarding the use
      of ICT services supporting critical or important functions.
    severity: high
    dora_pillar: ict_third_party_risk_management
    dora_article: "Article 29(2)"
    rts_reference: "TPR-RTS"
    affects:
      - pattern: "**/service-manifest.yaml"
        condition: "NOT has_key(third_party.subcontracting_chain)"
      - pattern: "**/service-manifest.yml"
        condition: "NOT has_key(third_party.subcontracting_chain)"
    remediation:
      strategy: add_configuration
      template: templates/subcontracting_chain.j2
      confidence_threshold: 0.85

  - id: DORA-TPR-003
    description: >
      Exit strategies must be documented for all critical ICT third-party
      service providers per DORA Article 28(8) on exit strategies for
      ICT third-party arrangements.
    severity: high
    dora_pillar: ict_third_party_risk_management
    dora_article: "Article 28(8)"
    rts_reference: "TPR-RTS"
    affects:
      - pattern: "**/service-manifest.yaml"
        condition: "NOT has_key(third_party.exit_strategy)"
      - pattern: "**/service-manifest.yml"
        condition: "NOT has_key(third_party.exit_strategy)"
    remediation:
      strategy: add_configuration
      template: templates/exit_strategy.j2
      confidence_threshold: 0.85

  - id: DORA-TPR-004
    description: >
      Concentration risk must be monitored across ICT third-party providers
      per DORA Article 29(1)(b) on avoiding excessive concentration on
      a single provider.
    severity: medium
    dora_pillar: ict_third_party_risk_management
    dora_article: "Article 29(1)(b)"
    rts_reference: "TPR-RTS"
    affects:
      - pattern: "**/service-manifest.yaml"
        condition: "NOT has_key(third_party.concentration_risk.provider_count)"
      - pattern: "**/service-manifest.yml"
        condition: "NOT has_key(third_party.concentration_risk.provider_count)"
    remediation:
      strategy: add_configuration
      template: templates/concentration_risk.j2
      confidence_threshold: 0.85

  - id: DORA-TPR-005
    description: >
      Contractual clauses for ICT third-party arrangements must include
      audit rights, data location, and security requirements per
      DORA Article 30 on key contractual provisions.
    severity: medium
    dora_pillar: ict_third_party_risk_management
    dora_article: "Article 30"
    rts_reference: "TPR-RTS"
    affects:
      - pattern: "**/service-manifest.yaml"
        condition: "NOT has_key(third_party.contract.audit_rights) OR NOT has_key(third_party.contract.data_location)"
      - pattern: "**/service-manifest.yml"
        condition: "NOT has_key(third_party.contract.audit_rights) OR NOT has_key(third_party.contract.data_location)"
    remediation:
      strategy: add_configuration
      template: templates/contract_clauses.j2
      confidence_threshold: 0.80

supersedes: null
