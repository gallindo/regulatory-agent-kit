apiVersion: v1
kind: Secret
metadata:
  name: rak-secrets
  namespace: rak
  labels:
    {{- include "rak.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.githubToken }}
  GITHUB_TOKEN: {{ .Values.secrets.githubToken | quote }}
  {{- end }}
  {{- if .Values.secrets.gitlabToken }}
  GITLAB_TOKEN: {{ .Values.secrets.gitlabToken | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: rak
  labels:
    {{- include "rak.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@postgresql.data.svc.cluster.local:5432/{{ .Values.postgresql.auth.database }}"
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  POSTGRES_ADMIN_PASSWORD: {{ .Values.postgresql.auth.adminPassword | quote }}
{{- if .Values.secrets.signingKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: signing-keys
  namespace: rak
  labels:
    {{- include "rak.labels" . | nindent 4 }}
type: Opaque
data:
  ed25519-private.pem: {{ .Values.secrets.signingKey }}
{{- end }}
