{{- if .Values.pgbouncer.enabled }}
# ---------------------------------------------------------------
# PgBouncer — connection pooler for PostgreSQL (data namespace)
# ---------------------------------------------------------------
# Docs: docs/hld.md Section 4.6
# Required when scaling beyond 3 workers.
# ---------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: data
  labels:
    app: pgbouncer
    {{- include "rak.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    rak = host=postgresql port=5432 dbname={{ .Values.postgresql.auth.database }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = {{ .Values.pgbouncer.poolMode }}
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    min_pool_size = {{ .Values.pgbouncer.minPoolSize }}
    reserve_pool_size = {{ .Values.pgbouncer.reservePoolSize }}
    server_idle_timeout = 300
    server_connect_timeout = 15
    query_wait_timeout = 120
    log_connections = 1
    log_disconnections = 1
    stats_period = 60
    admin_users = {{ .Values.postgresql.auth.username }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: data
  labels:
    app: pgbouncer
    {{- include "rak.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: {{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          ports:
            - name: pgbouncer
              containerPort: 6432
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            - name: userlist
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
              readOnly: true
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "6432"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - localhost
                - -p
                - "6432"
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: pgbouncer-config
        - name: userlist
          secret:
            secretName: pgbouncer-userlist
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: data
  labels:
    app: pgbouncer
    {{- include "rak.labels" . | nindent 4 }}
spec:
  type: {{ .Values.pgbouncer.service.type }}
  ports:
    - port: {{ .Values.pgbouncer.service.port }}
      targetPort: 6432
      protocol: TCP
      name: pgbouncer
  selector:
    app: pgbouncer
{{- end }}
