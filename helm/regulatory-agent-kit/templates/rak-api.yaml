{{- if .Values.rakApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rak-api
  namespace: rak
  labels:
    app: rak-api
    {{- include "rak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.rakApi.replicaCount }}
  selector:
    matchLabels:
      app: rak-api
  template:
    metadata:
      labels:
        app: rak-api
        {{- include "rak.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: rak-api
      containers:
        - name: rak-api
          image: {{ .Values.rakApi.image.repository }}:{{ .Values.rakApi.image.tag }}
          imagePullPolicy: {{ .Values.rakApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: rak-secrets
            - secretRef:
                name: db-credentials
          env:
            - name: RAK_TEMPORAL_ADDRESS
              value: "temporal-frontend.temporal.svc.cluster.local:7233"
            - name: RAK_ELASTICSEARCH_URL
              value: "http://elasticsearch.data.svc.cluster.local:9200"
            - name: RAK_LLM_URL
              value: "http://litellm-proxy.rak.svc.cluster.local:4000"
            - name: RAK_OBSERVABILITY_MLFLOW_TRACKING_URI
              value: "http://mlflow-server.rak.svc.cluster.local:5000"
            {{- if .Values.rakApi.apiToken }}
            - name: RAK_API_TOKEN
              value: {{ .Values.rakApi.apiToken | quote }}
            {{- end }}
            {{- range $k, $v := .Values.rakApi.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.rakApi.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rak-api
  namespace: rak
  labels:
    app: rak-api
    {{- include "rak.labels" . | nindent 4 }}
spec:
  type: {{ .Values.rakApi.service.type }}
  ports:
    - port: {{ .Values.rakApi.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: rak-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rak-api
  namespace: rak
  labels:
    {{- include "rak.labels" . | nindent 4 }}
{{- end }}
